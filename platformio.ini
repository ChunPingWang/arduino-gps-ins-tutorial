; ============================================================
;  Arduino GPS-INS Tutorial — PlatformIO Configuration
; ============================================================
[env:megaatmega2560]
platform  = atmelavr
board     = megaatmega2560
framework = arduino

; ---- Serial monitor ----------------------------------------
monitor_speed = 115200

; ---- Library dependencies ----------------------------------
lib_deps =
    feilipu/FreeRTOS @ ^11.1.0-3
    electroniccats/MPU6050 @ ^1.3.0
    mprograms/QMC5883LCompass @ ^1.2.1
    mikalhart/TinyGPSPlus @ ^1.0.3
    jgromes/RadioLib @ ^6.6.0

; ---- Build flags -------------------------------------------
build_flags =
    -DENABLE_HC12          ; compile HC-12 telemetry (Phase A)
    ; -DENABLE_LORA        ; uncomment for Phase B
    -DDEBUG_SERIAL         ; extra Serial debug output

; ---- ESP32 environment (optional, Phase D) -----------------
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    ${env:megaatmega2560.lib_deps}

build_flags =
    -DENABLE_HC12
    -DDEBUG_SERIAL
